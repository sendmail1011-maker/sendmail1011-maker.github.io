<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo教室 | 投資 × 健身</title>
    <style>
        body {
            margin: 0;
            font-family: "Noto Sans TC", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        header p {
            font-size: 18px;
            color: #cbd5f5;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card h2 {
            color: #22c55e;
            margin-bottom: 15px;
        }

        .card p {
            color: #cbd5f5;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #38bdf8;
            color: #000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>Leo教室</h1>
    <p>投資思維 × 健身紀律｜打造更強大的自己</p>
</header>

<section class="container">

    <div class="card">
        <h2>📈 投資學習</h2>
        <p>
            從基礎資產配置到進階策略規劃，建立穩定獲利系統。
            掌握市場趨勢，打造長期財務自由。
        </p>
        <a href="#" class="btn">開始學習</a>
    </div>

    <div class="card">
        <h2>💪 健身訓練</h2>
        <p>
            提升體能與自律，透過系統化訓練打造強健體魄。
            身體與財富，同步成長。
        </p>
        <a href="#" class="btn">開始訓練</a>
    </div>

    <div class="card">
        <h2>🚀 成長系統</h2>
        <p>
            投資與健身的共同核心：紀律、策略與執行力。
            建立你的長期成長飛輪。
        </p>
        <a href="#" class="btn">加入我們</a>
    </div>

</section>

<footer>
    © 2026 Leo教室｜打造你的財務與身體雙自由
</footer>

</body>
</html>
